{{ define "bocas_fragment" }}
<div class="card">
  <h3 style="margin-top: 0;">Bocas do tanque {{ .Trailer.Plate }}</h3>

  <table class="table">
    <thead>
      <tr>
        <th>Boca</th>
        <th>Capacidade</th>
        <th>Cliente</th>
        <th>Produto</th>
      </tr>
    </thead>

    <tbody>
      {{ range .Trailer.Compartments }}
      <tr>
        <td>
          Boca {{ .Numero }}
          <input type="hidden" name="compartment_id[]" value="{{ .ID }}">
        </td>

        <td>{{ printf "%.0f" .CapacidadeLitros }} L</td>

        <td>
          <select name="client_id[]" required>
            <option value="">Selecione</option>
            {{ range $.Clients }}
            <option value="{{ .ID }}">{{ .Name }}</option>
            {{ end }}
          </select>
        </td>

        <td>
          <select name="produto[]" required>
            <option value="">Selecione</option>
            {{ range $.Produtos }}
            <option value="{{ . }}">{{ . }}</option>
            {{ end }}
          </select>
        </td>
      </tr>
      {{ end }}
    </tbody>
  </table>
</div>
{{ end }}
