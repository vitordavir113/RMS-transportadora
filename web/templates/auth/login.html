{{ define "auth_content" }}

<div class="login-page">
  <div class="login-card">
   <div class="login-brand-logo">
  <img src="/static/img/vd-logo.png" alt="VD Gestão">
</div>
    <div class="login-header">
      <h1>Entrar</h1>
   <p>Acesse o painel de gestão da transportadora.</p>
    </div>

    {{ if .Error }}
    <div class="login-error">
      <i class="bi bi-exclamation-triangle"></i>
      {{ .Error }}
    </div>
    {{ end }}

    <form method="POST" action="/login">
      <div class="form-row">
        <label class="form-label" for="username">Usuário</label>
<input id="username" class="form-control" name="username" placeholder="admin" autocomplete="username" required>

      <div class="form-row">
        <label class="form-label" for="password">Senha</label>
<input id="password" class="form-control" type="password" name="password" placeholder="admin123" autocomplete="current-password" required>

      <button class="btn btn-primary btn-lg btn-block" type="submit">
        <i class="bi bi-box-arrow-in-right"></i>
        Entrar
      </button>
    </form>

  </div>
</div>

{{ end }}
