{{ define "layout" }}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }} · Transportadora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function () {
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body class="app-body">
  <div class="layout">
    <aside class="sidebar">
      <div>
        <a href="/" class="brand-logo">
  <img src="/static/img/vd-logo.png" alt="VD Gestão">
</a>
        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/trips">Viagens</a>
          <a href="/clients">Clientes</a>
          <a href="/drivers">Motoristas</a>
          <a href="/tractors">Cavalos</a>
          <a href="/trailers">Tanques</a>
          <a href="/reports/monthly">Relatórios</a>
          <a href="/history">Histórico</a>
        </nav>
      </div>

      <form method="POST" action="/logout" class="logout-form">
        <button type="submit" class="logout-btn">
          <i class="bi bi-box-arrow-left"></i>
          Sair
        </button>
      </form>
    </aside>

    <main class="main">
      <div class="app-topbar">
        <button class="theme-switch" type="button" onclick="toggleTheme()" aria-label="Alternar tema">
          <span class="theme-icon sun"><i class="bi bi-sun-fill"></i></span>
          <span class="theme-icon moon"><i class="bi bi-moon-fill"></i></span>
        </button>
      </div>

      {{ template "content" . }}
    </main>
  </div>

  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") || "dark";
      const next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    }
  </script>
</body>
</html>
{{ end }}
