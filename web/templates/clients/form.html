{{ define "content" }}
<form method="POST" action="{{ if .Client.ID }}/clients/{{ .Client.ID }}{{ else }}/clients{{ end }}" class="card">
  <div class="form-grid">
    <div class="form-group">
      <label>Nome / Razão social</label>
      <input name="name" value="{{ .Client.Name }}" required>
    </div>

    <div class="form-group">
      <label>CPF/CNPJ</label>
      <input name="document" value="{{ .Client.Document }}">
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input name="phone" value="{{ .Client.Phone }}">
    </div>

    <div class="form-group">
      <label>Tipo de frete</label>
      <select name="freight_type" required>
        <option value="POR_BOCA" {{ if eq .Client.FreightType "POR_BOCA" }}selected{{ end }}>Por boca</option>
        <option value="POR_LITRO" {{ if eq .Client.FreightType "POR_LITRO" }}selected{{ end }}>Por litro</option>
        <option value="POR_VIAGEM" {{ if eq .Client.FreightType "POR_VIAGEM" }}selected{{ end }}>Por viagem</option>
      </select>
    </div>

    <div class="form-group">
      <label>Valor do frete</label>
      <input name="freight_value" type="number" step="0.01" min="0" value="{{ printf "%.2f" .Client.FreightValue }}" required>
    </div>
  </div>

  <div class="actions" style="margin-top: 22px;">
    <button class="btn btn-primary" type="submit">Salvar cliente</button>
    <a class="btn btn-secondary" href="/clients">Cancelar</a>
  </div>
</form>
{{ end }}
